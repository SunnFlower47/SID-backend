; PHP Configuration for File Upload
; Increase upload limits to 5MB

upload_max_filesize = 5M
post_max_size = 5M
max_execution_time = 300
max_input_time = 300
memory_limit = 256M
max_file_uploads = 20

; Additional settings for better performance
file_uploads = On
allow_url_fopen = On
default_socket_timeout = 60


